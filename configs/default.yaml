# Default FIAC config. Tunable per environment.
seed: 42
data_dir: data
artifact_dir: artifacts
report_dir: reports

data:
  sys_csv: system_state_5min.csv
  job_csv: job_impact_dataset.csv
  node_csv: node-data.csv
  past_bins: 12
  future_bins: 6
  bin_seconds: 300
  z_upper: 1.645

model:
  forecaster: nbeats
  nbeats_blocks: 4
  nbeats_hidden: 128
  dlin_epochs: 30
  dlin_bs: 128
  dlin_lr: 0.005
  dlin_kernel: 7
  xgb_params:
    objective: reg:squarederror
    max_depth: 6
    learning_rate: 0.05
    tree_method: hist
  xgb_rounds: 400
  xgb_early_stop: 20
  xgb_n_splits: 3
  congestion_use_lstm: false
  congestion_beta: 2.0
  congestion_min_recall: 0.80
  congestion_max_recall: 0.98
  congestion_min_lift: 1.25

guardrail:
  bw_quantile_soft: 0.95
  bw_quantile_hard: 0.99
  rpc_quantile_soft: 0.95
  rpc_quantile_hard: 0.99
  sustained_bins: 2
  z: 1.645
  hard_buffer: 1.1
  rescue_thr_max: 0.15
  kf_sigma_w2_bw: 0.0001
  kf_sigma_v2_bw: 0.01
  kf_p0_bw: 1.0
  kf_sigma_w2_rpc: 1.0e12
  kf_sigma_v2_rpc: 1.0e14
  kf_p0_rpc: 1.0e14
  auto_tune: true

mlops:
  k_nis: 6.63
  conf_min: 0.5
  recent_window: 20

llm:
  use_llm: true
  backend: http
  api_base: http://localhost:8080
  api_model: gemma-3-4b-it
  api_timeout_sec: 30
  batch_size: 32
  max_new_tokens: 64

sim:
  capacity_quantile: 0.95
  capacity_min: 50
  duration_logn_mean_sec: 7200
  duration_logn_sigma: 1.0
  duration_min_sec: 60
  duration_max_sec: 604801
  seed: 42
