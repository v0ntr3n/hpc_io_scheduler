# Strict mode: tighter thresholds, prefer HOLD over THROTTLE.
# Use for high-stakes workloads or after incident.
seed: 42
data_dir: data
artifact_dir: artifacts
report_dir: reports

data:
  sys_csv: system_state_5min.csv
  job_csv: job_impact_dataset.csv
  past_bins: 12
  future_bins: 6
  bin_seconds: 300
  z_upper: 1.645

model:
  forecaster: nbeats
  nbeats_blocks: 6
  nbeats_hidden: 192
  dlin_epochs: 30
  dlin_bs: 128
  dlin_lr: 0.005
  dlin_kernel: 7
  xgb_params: {objective: reg:squarederror, max_depth: 6, learning_rate: 0.05, tree_method: hist}
  xgb_rounds: 400
  xgb_early_stop: 20
  xgb_n_splits: 3
  congestion_use_lstm: false
  congestion_beta: 2.0
  congestion_min_recall: 0.90   # stricter
  congestion_max_recall: 0.95
  congestion_min_lift: 1.5

guardrail:
  bw_quantile_soft: 0.90        # tighter
  bw_quantile_hard: 0.97
  rpc_quantile_soft: 0.90
  rpc_quantile_hard: 0.97
  sustained_bins: 1             # 1-bin trip = HOLD
  z: 1.96                       # 97.5% upper
  hard_buffer: 1.05
  rescue_thr_max: 0.05          # rarely rescue
  kf_sigma_w2_bw: 0.0001
  kf_sigma_v2_bw: 0.01
  kf_p0_bw: 1.0
  kf_sigma_w2_rpc: 1.0e12
  kf_sigma_v2_rpc: 1.0e14
  kf_p0_rpc: 1.0e14
  auto_tune: true

mlops: {k_nis: 6.63, conf_min: 0.5, recent_window: 20}
llm: {use_llm: true, backend: http,
      api_base: http://localhost:8080, api_model: gemma-3-4b-it, api_timeout_sec: 30,
      batch_size: 32, max_new_tokens: 64}
sim: {capacity_quantile: 0.95, capacity_min: 50, duration_logn_mean_sec: 7200,
      duration_logn_sigma: 1.0, duration_min_sec: 60, duration_max_sec: 604800, seed: 42}
